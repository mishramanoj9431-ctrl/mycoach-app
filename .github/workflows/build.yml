name: Check Replit Zip Structure

on:
  workflow_dispatch:

jobs:
  check-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Extract and List Files
        run: |
          sudo apt-get install unzip
          unzip mycoach-web.zip -d temp_project
          echo "=== ROOT LEVEL FILES ==="
          ls -la temp_project
          echo "=== RECURSIVE ALL FILES ==="
          find temp_project -maxdepth 3
