name: Build Play Store Android App Bundle (.aab)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Extract Project ZIP File
        run: |
          sudo apt-get install unzip
          unzip mycoach-web.zip -d .
          # Agar files ek subfolder mein hain, toh check karne ke liye
          ls -la

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          # Agar mycoach-web2 folder hai toh uske andar jaakar install karega, nahi toh root par
          if [ -d "mycoach-web2" ]; then cd mycoach-web2; fi
          npm install -g eas-cli
          npm install

      - name: Build Android App Bundle (.aab)
        run: |
          if [ -d "mycoach-web2" ]; then cd mycoach-web2; fi
          npx expo prebuild --platform android
          cd android && ./gradlew bundleRelease

      - name: Upload Production .aab Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mycoach-playstore-bundle
          path: |
            **/android/app/build/outputs/bundle/release/app-release.aab
