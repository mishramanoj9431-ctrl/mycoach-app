name: Generate Testing APK and Play Store AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Extract Web Files
        run: |
          sudo apt-get install unzip
          unzip -o mycoach-web.zip -d .
          ls -la

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Set up Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Install Cordova and Build Android Testing APK
        run: |
          npm install -g cordova
          cordova create my-app com.mycoach.app MyCoach
          cd my-app
          rm -rf www/*
          cp -r ../* www/ || true
          rm -rf www/my-app www/mycoach-web.zip www/.github
          
          cordova platform add android
          cordova build android --debug

      - name: Upload Testing APK
        uses: actions/upload-artifact@v4
        with:
          name: mycoach-testing-apk
          path: "my-app/platforms/android/app/build/outputs/apk/debug/*.apk"
